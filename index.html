<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>RecXpats</title>
    
    <!-- PWA Manifest & Theme Settings -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="shortcut icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    
    <!-- Suppress benign WebSocket/HMR connection failures in sandboxed environment -->
    <script>
      (function() {
        var pattern = /websocket|ws:\/\/|wss:\/\/|opened/i;
        
        // Suppress unhandled promise rejections related to web socket
        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          var msg = reason ? (reason.message || String(reason)) : '';
          if (pattern.test(msg)) {
            event.preventDefault();
            event.stopPropagation();
            console.debug('Suppressed benign HMR WebSocket rejection:', msg);
          }
        });

        // Suppress uncaught error events related to web socket
        window.addEventListener('error', function(event) {
          var msg = event.message || '';
          if (pattern.test(msg)) {
            event.preventDefault();
            event.stopPropagation();
            console.debug('Suppressed benign error:', msg);
          }
        }, true);

        // Intercept console.error and console.warn to suppress the specific annoying HMR websocket message
        var originalError = console.error;
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          var isBenignWebsocketError = args.some(function(arg) {
            if (!arg) return false;
            var str = typeof arg === 'string' ? arg : String(arg);
            return pattern.test(str) || str.indexOf('[vite] failed to connect to websocket') !== -1;
          });
          if (isBenignWebsocketError) {
            console.debug.apply(console, ['[Suppressed Benign Vite Error]'].concat(args));
            return;
          }
          originalError.apply(console, arguments);
        };

        var originalWarn = console.warn;
        console.warn = function() {
          var args = Array.prototype.slice.call(arguments);
          var isBenignWebsocketWarn = args.some(function(arg) {
            if (!arg) return false;
            var str = typeof arg === 'string' ? arg : String(arg);
            return pattern.test(str) || str.indexOf('[vite] failed to connect to websocket') !== -1;
          });
          if (isBenignWebsocketWarn) {
            console.debug.apply(console, ['[Suppressed Benign Vite Warning]'].concat(args));
            return;
          }
          originalWarn.apply(console, arguments);
        };

        // Override WebSocket to catch connection issues early and mock Vite HMR connections silently
        var OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          window.WebSocket = function(url, protocols) {
            var isViteHmr = typeof url === 'string' && (
              url.indexOf('vite') !== -1 || 
              url.indexOf('localhost') !== -1 || 
              url.indexOf('127.0.0.1') !== -1 ||
              protocols === 'vite-hmr'
            );
            
            if (isViteHmr) {
              console.log('[Sandbox HMR] Silently disabling HMR WebSocket connection for sandbox stability.');
              
              var listeners = {
                open: [],
                message: [],
                error: [],
                close: []
              };

              var mockSocket = {
                url: url,
                protocol: protocols || '',
                readyState: 0, // CONNECTING
                bufferedAmount: 0,
                extensions: '',
                binaryType: 'blob',
                
                onopen: null,
                onmessage: null,
                onerror: null,
                onclose: null,

                addEventListener: function(type, callback) {
                  if (listeners[type]) {
                    listeners[type].push(callback);
                  }
                },

                removeEventListener: function(type, callback) {
                  if (listeners[type]) {
                    var idx = listeners[type].indexOf(callback);
                    if (idx !== -1) {
                      listeners[type].splice(idx, 1);
                    }
                  }
                },

                dispatchEvent: function(event) {
                  var type = event ? event.type : '';
                  if (listeners[type]) {
                    listeners[type].forEach(function(cb) {
                      try {
                        cb(event);
                      } catch (e) {}
                    });
                  }
                  return true;
                },

                send: function(data) {
                  // No-op
                },

                close: function() {
                  this.readyState = 3; // CLOSED
                  var event = { type: 'close', wasClean: true, code: 1000, reason: 'Silenced HMR' };
                  if (this.onclose) {
                    try { this.onclose(event); } catch (e) {}
                  }
                  if (listeners.close) {
                    listeners.close.forEach(function(cb) {
                      try { cb(event); } catch (e) {}
                    });
                  }
                }
              };

              // Simulate a successful open connection after a short delay to keep Vite client completely quiet
              setTimeout(function() {
                if (mockSocket.readyState === 0) {
                  mockSocket.readyState = 1; // OPEN
                  var event = { type: 'open' };
                  if (mockSocket.onopen) {
                    try { mockSocket.onopen(event); } catch (e) {}
                  }
                  if (listeners.open) {
                    listeners.open.forEach(function(cb) {
                      try { cb(event); } catch (e) {}
                    });
                  }
                }
              }, 50);

              return mockSocket;
            }

            try {
              return new OriginalWebSocket(url, protocols);
            } catch (e) {
              console.debug('Suppressed WebSocket creation exception:', e);
              return {
                url: url,
                readyState: 3,
                addEventListener: function() {},
                removeEventListener: function() {},
                send: function() {},
                close: function() {},
                dispatchEvent: function() { return true; }
              };
            }
          };
          window.WebSocket.prototype = OriginalWebSocket.prototype;
          for (var key in OriginalWebSocket) {
            if (Object.prototype.hasOwnProperty.call(OriginalWebSocket, key)) {
              window.WebSocket[key] = OriginalWebSocket[key];
            }
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Service Worker registered successfully:', reg.scope))
            .catch(err => console.warn('PWA Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
